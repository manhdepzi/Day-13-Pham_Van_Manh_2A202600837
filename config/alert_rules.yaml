alerts:
  - name: rag_latency_spike
    severity: P2
    scenario: rag_slow
    metric: max_recent_rag_latency_ms
    operator: ">"
    threshold: 2000
    unit: ms
    condition: max_recent_rag_latency_ms > 2000
    type: symptom-based
    owner: individual-oncall
    runbook: docs/runbook.md#rag_slow
  - name: high_error_rate
    severity: P1
    scenario: tool_fail
    metric: error_rate_pct
    operator: ">"
    threshold: 5
    unit: percent
    condition: error_rate_pct > 5
    type: symptom-based
    owner: individual-oncall
    runbook: docs/runbook.md#tool_fail
  - name: cost_budget_spike
    severity: P2
    scenario: cost_spike
    metric: max_recent_output_tokens
    operator: ">"
    baseline_metric: average_output_tokens
    baseline_multiplier: 2
    unit: tokens
    condition: max_recent_output_tokens > 2x baseline average_output_tokens
    type: symptom-based
    owner: finops-owner
    runbook: docs/runbook.md#cost_spike
